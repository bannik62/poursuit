services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env
    ports:
      - '3004:3000'  # 3004 hôte : spirale=3002, trading=3003
    environment:
      NODE_ENV: development
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me}
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:8083}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8083}
      MIN_PLAYERS: ${MIN_PLAYERS:-2}
      MAX_PLAYERS: ${MAX_PLAYERS:-6}

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - '8083:80'  # 8083 : spirale=8081, trading=8082, yt=8080
    depends_on:
      - backend

  # Dev téléphone : docker compose --profile ngrok up -d
  # puis : ./scripts/ngrok-dev.sh
  ngrok:
    image: ngrok/ngrok:latest
    profiles: [ngrok]
    command: http frontend:80
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    ports:
      - '4040:4040'
    depends_on:
      - frontend
